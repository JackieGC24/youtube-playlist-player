<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Ensure the origin is sent so the API key's HTTP-referrer restriction can match -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>YouTube Playlist Player</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .input-section {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 8px;
            margin: 0;
            background-color: #333;
            border: 1px solid #555;
            color: #fff;
            border-radius: 4px;
        }

        #playlist-input-multi {
            flex: 1;
            min-height: 38px;
            max-height: 140px;
            resize: vertical;
            padding: 8px;
            margin: 0;
            background-color: #333;
            border: 1px solid #555;
            color: #fff;
            border-radius: 4px;
            font-family: inherit;
            font-size: inherit;
        }

        .mode-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
        }

        .mode-toggle input[type="checkbox"] {
            flex: none;
            width: 16px;
            height: 16px;
            margin: 0;
            padding: 0;
            cursor: pointer;
            accent-color: #444;
        }

        button, select {
            padding: 8px 16px;
            margin: 0;
            background-color: #333;
            border: 1px solid #555;
            color: #fff;
            border-radius: 4px;
            white-space: nowrap;
        }

        button {
            cursor: pointer;
        }

        button:hover {
            background-color: #444;
        }

        #player-container {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }

        #playlist-container {
            max-height: 300px;
            overflow-y: auto;
            background-color: #2a2a2a;
            padding: 10px;
            border-radius: 4px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid #444;
            touch-action: manipulation;
        }

        .item-title {
            flex: 1;
            min-width: 0;
        }

        .item-remove {
            background: none;
            border: none;
            color: #555;
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            padding: 0 6px;
            flex-shrink: 0;
            transition: color 0.2s;
        }

        .item-remove:hover {
            background: none;
            color: #ff4444;
        }

        .playlist-item:hover {
            background-color: #333;
        }

        .playlist-item.active {
            background-color: #444;
        }

        /* Source-playlist chips shown above the list when playlists are combined */
        .playlist-groups {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .groups-label {
            color: #888;
            font-size: 0.9em;
        }

        .playlist-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            max-width: 260px;
            padding: 4px 6px 4px 12px;
            background-color: #333;
            border: 1px solid #555;
            border-radius: 14px;
            font-size: 0.9em;
            color: #fff;
        }

        .chip-name {
            color: #fff;
            text-decoration: none;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: color 0.2s;
        }

        .chip-name:hover {
            color: #ff4d4d; /* YouTube-ish red on hover */
        }

        .chip-remove {
            background: none;
            border: none;
            color: #999;
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            padding: 0 4px;
            border-radius: 50%;
            transition: color 0.2s, background-color 0.2s;
        }

        .chip-remove:hover {
            color: #fff;
            background-color: #ff4444;
        }

        .controls {
            margin: 10px 0;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #2a2a2a;
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        .loading {
            display: none;
            margin-left: 10px;
            color: #888;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .video-counter {
            margin-left: 10px;
            color: #888;
        }

        .playlist-title {
            font-size: 1.8em;
            padding: 15px 0;
            color: #fff;
            border-bottom: 1px solid #444;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }

        .nav-button {
            padding: 8px 20px;
            background-color: #333;
            border: 1px solid #555;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:hover {
            background-color: #444;
        }

        .playlist-header {
            display: flex;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #444;
            margin-bottom: 15px;
        }

        .playlist-title {
            flex: 1;
            font-size: 1.8em;
            color: #fff;
            padding: 0;
            border-bottom: none;
            margin-bottom: 0;
            font-weight: 500;
        }

        .video-counter {
            color: #888;
            margin-left: 15px;
            font-size: 1.2em;
        }

        .welcome-container {
            text-align: center;
            padding: 40px 20px;
            background-color: #2a2a2a;
            border-radius: 8px;
            margin: 20px 0;
        }

        .welcome-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #fff;
        }

        .welcome-text {
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .example-text {
            color: #888;
            font-family: monospace;
            background-color: #333;
            padding: 8px;
            border-radius: 4px;
            display: inline-block;
            margin: 5px 0;
        }

        .example-section {
            margin-top: 30px;
            opacity: 0.6;
        }

        .example-label {
            color: #888;
            font-style: italic;
            margin: 20px 0 10px 0;
        }

        .example-playlist-item {
            padding: 8px;
            background-color: #333;
            border-bottom: 1px solid #444;
            color: #aaa;
        }

        .example-playlist-header {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #444;
            margin-bottom: 15px;
        }

        .example-state {
            opacity: 0.6;
        }

        #initial-example {
            margin: 20px 0;
            border-bottom: none;
        }

        .resume-button {
            background-color: #2a6b2a;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
        }

        .resume-button:hover {
            background-color: #357a35;
        }

        .error-message {
            background-color: #ff4444;
            color: white;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            display: none;
        }

        .api-warning {
            background-color: #2a2a2a;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }

        #playlist-title {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .loop-control {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #fff;
            margin-left: 15px;
            cursor: pointer;
            padding: 8px 0;
        }

        .loop-control input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
            margin: 0;
            accent-color: #444;
        }

        .playlist-title a {
            color: #fff;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .playlist-title a:hover {
            color: #ff0000; /* YouTube red */
            text-decoration: none;
        }

        .playlist-title a:visited {
            color: #fff;
        }

        .playlist-title a:visited:hover {
            color: #ff0000;
        }

        .playlist-history {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #444;
        }

        .history-title {
            font-size: 1.2em;
            color: #fff;
            margin-bottom: 15px;
        }

        .history-item {
            padding: 10px;
            margin: 5px 0;
            background-color: #333;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            color: #fff;
        }

        .history-item:hover {
            background-color: #444;
        }

        .playlist-favorites {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #444;
        }

        .favorites-title {
            font-size: 1.2em;
            color: #fff;
            margin-bottom: 15px;
        }

        .favorite-button {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 0 15px;
            transition: transform 0.2s ease;
        }

        .favorite-button:hover {
            transform: scale(1.1);
        }

        .rename-button {
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            padding: 0 6px;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .rename-button:hover {
            color: #fff;
            transform: scale(1.1);
        }

        .delete-button {
            background: none;
            border: none;
            color: #666;
            font-size: 20px;
            cursor: pointer;
            padding: 0 8px;
            margin-left: 8px;
            transition: color 0.2s;
        }

        .delete-button:hover {
            color: #ff4444;
        }

        .history-item, .favorite-item {
            padding: 10px;
            margin: 5px 0;
            background-color: #333;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .history-item:hover, .favorite-item:hover {
            background-color: #444;
        }

        #version {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #666;
            font-size: 12px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #333;
            color: white;
            padding: 15px 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .notification.show {
            opacity: 1;
            animation: flashNotification 0.3s ease;
        }

        @keyframes flashNotification {
            0% {
                background-color: #fff;
                color: #333;
            }
            100% {
                background-color: #333;
                color: #fff;
            }
        }

        .section-header {
            position: relative;
            text-align: center;
            padding: 10px 20px;
            margin: 0;
        }

        .section-header h3 {
            display: inline;  /* Keep header inline */
            margin: 0;
            font-weight: normal;
            position: relative;  /* For positioning the clear button */
        }

        .clear-button {
            position: absolute;
            left: calc(50% + 85px);  /* Increased offset to prevent overlap */
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 3px;
            transition: all 0.2s ease;
        }

        .clear-button:hover {
            color: #ff4444;
            background-color: rgba(255, 68, 68, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="input-section">
            <input type="text" id="playlist-input" placeholder="Enter YouTube Playlist URL or ID">
            <textarea id="playlist-input-multi" placeholder="Paste multiple playlist URLs or IDs — one per line" style="display: none;"></textarea>
            <label class="mode-toggle" title="Load several playlists at once">
                <input type="checkbox" id="multi-toggle" onchange="toggleInputMode()">
                Multiple
            </label>
            <button onclick="handleLoadClick()">Load Playlist</button>
            <button id="add-playlist-button" onclick="handleAddClick()" style="display: none;">Add to Current</button>
            <button onclick="shufflePlaylist()">Shuffle</button>
            <select id="size-selector" onchange="resizePlayer(); saveSession()">
                <option value="small">Small</option>
                <option value="medium" selected>Medium</option>
                <option value="large">Large</option>
            </select>
            <button id="resume-button" class="resume-button" onclick="resumeLastSession()">Resume Last Session</button>
            <span id="loading" class="loading">Loading playlist...</span>
        </div>

        <div id="error-message" class="error-message"></div>

        <div id="welcome-section" class="welcome-container">
            <div class="welcome-title">YouTube Playlist Player</div>
            <div class="welcome-text">
                Enter a YouTube playlist URL or ID to get started<br>
                You can enter either a full URL:
            </div>
            <div class="example-text">
                https://www.youtube.com/playlist?list=PLxxx...
            </div>
            <div class="welcome-text">
                Or just the playlist ID:
            </div>
            <div class="example-text">
                PLxxx...
            </div>
            
            <div id="playlist-favorites" class="playlist-favorites">
                <div class="favorites-title">Favorite Playlists</div>
                <div id="favorites-items"></div>
            </div>

            <div id="playlist-history" class="playlist-history">
                <div class="section-header">
                    <h3>Recent Playlists</h3>
                    <button class="clear-button" onclick="clearHistory()" title="Clear history">clear</button>
                </div>
                <div id="history-items"></div>
            </div>
        </div>

        <div id="player-container"></div>
        
        <div class="nav-controls example-state" id="initial-controls">
            <button class="nav-button" disabled>Previous</button>
            <button class="nav-button" disabled>Next</button>
        </div>

        <div class="nav-controls" id="actual-controls" style="display: none;">
            <button class="nav-button" onclick="playPrevious()">Previous</button>
            <button class="nav-button" onclick="playNext()">Next</button>
            <label class="loop-control">
                <input type="checkbox" id="loop-checkbox">
                Loop Playlist
            </label>
        </div>

        <div class="playlist-header" id="actual-playlist-header" style="display: none;">
            <div id="playlist-title" class="playlist-title"></div>
            <button id="rename-button" onclick="renamePlaylist()" class="rename-button" title="Rename this playlist">✎</button>
            <button id="favorite-button" onclick="toggleFavorite()" class="favorite-button">☆</button>
            <div id="video-counter" class="video-counter"></div>
        </div>

        <div id="playlist-groups" class="playlist-groups" style="display: none;"></div>

        <div id="playlist-container" style="display: none;"></div>
    </div>

    <script>
        let player;
        let playerReady = false;
        let playerReadyResolve;
        const playerReadyPromise = new Promise((resolve) => {
            playerReadyResolve = resolve;
        });

        let apiLoadPromise = null;

        let playlistItems = [];
        let playedVideos = [];
        let currentIndex = 0;

        function initializePlayer() {
            console.log('Initializing player...');
            player = new YT.Player('player-container', {
                height: '480',
                width: '853',
                playerVars: {
                    'playsinline': 1,
                    'rel': 0,
                    'origin': window.location.origin,
                    'modestbranding': 1,
                    'showinfo': 0,
                    'enablejsapi': 1
                },
                events: {
                    'onReady': function(event) {
                        console.log('Player ready');
                        playerReady = true;
                        if (playerReadyResolve) {
                            playerReadyResolve();
                        }
                    },
                    'onStateChange': onPlayerStateChange,
                    'onError': function(event) {
                        // 2: invalid param, 5: HTML5 error, 100: removed/private,
                        // 101/150: embedding disabled by owner. All are unplayable,
                        // so skip to the next video in the playlist.
                        console.error('Player Error:', event.data);
                        const unplayable = [2, 5, 100, 101, 150];
                        if (unplayable.includes(event.data)) {
                            playNext();
                        }
                    }
                }
            });
        }

        // Prevent thumbnail preview requests
        if (typeof YT !== 'undefined' && YT.PlayerState) {
            YT.PlayerState.UNSTARTED = -1;
            YT.PlayerState.ENDED = 0;
            YT.PlayerState.PLAYING = 1;
            YT.PlayerState.PAUSED = 2;
            YT.PlayerState.BUFFERING = 3;
            YT.PlayerState.CUED = 5;
        }

        // Handle player state changes
        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                const isLooping = document.getElementById('loop-checkbox').checked;
                if (isLooping || currentIndex < playlistItems.length - 1) {
                    playNext();
                }
            } else if (event.data === YT.PlayerState.UNSTARTED) {
                // Check if video is playable after a short delay
                setTimeout(() => {
                    const playerState = player.getPlayerState();
                    if (playerState === YT.PlayerState.UNSTARTED) {
                        console.log('Video unplayable, skipping to next...');
                        playNext();
                    }
                }, 2000);  // 2 second delay to allow video to start
            }
        }

        // Extract playlist ID from URL or direct ID
        function getPlaylistId(input) {
            if (!input) return null;
            
            // Clean the input
            input = String(input).trim();
            
            // Handle full URLs
            const urlMatch = input.match(/[?&]list=([A-Za-z0-9_-]+)/);
            if (urlMatch) return urlMatch[1];
            
            // Handle direct IDs
            const idMatch = input.match(/^([A-Za-z0-9_-]+)$/);
            if (idMatch) return idMatch[1];

            return null;
        }

        // Parse several playlist URLs/IDs from a blob of text (newlines, commas, spaces).
        // Returns a de-duplicated list of playlist IDs.
        function getPlaylistIds(input) {
            if (!input) return [];
            const ids = [];
            String(input).split(/[\s,]+/).filter(Boolean).forEach(token => {
                const id = getPlaylistId(token);
                if (id && !ids.includes(id)) ids.push(id);
            });
            return ids;
        }

        // Read whatever the user typed, honoring the single/multiple toggle
        function getEnteredIds() {
            const multiMode = document.getElementById('multi-toggle').checked;
            if (multiMode) {
                return getPlaylistIds(document.getElementById('playlist-input-multi').value);
            }
            const single = getPlaylistId(document.getElementById('playlist-input').value);
            return single ? [single] : [];
        }

        // Switch the input between a single-line field and the multi-line textarea
        function toggleInputMode() {
            const multi = document.getElementById('multi-toggle').checked;
            const single = document.getElementById('playlist-input');
            const multiField = document.getElementById('playlist-input-multi');

            if (multi) {
                // Carry a typed single value into the textarea
                if (single.value.trim() && !multiField.value.trim()) {
                    multiField.value = single.value.trim();
                }
                single.style.display = 'none';
                multiField.style.display = 'block';
            } else {
                // Carry the first entry back into the single field
                const first = getPlaylistIds(multiField.value)[0];
                if (first && !single.value.trim()) single.value = first;
                multiField.style.display = 'none';
                single.style.display = 'block';
            }
        }

        // Load a list of playlists, combining them into one queue.
        // Drives the existing single-field load + addPlaylist() combine path.
        async function loadPlaylists(ids, { autoplay = true } = {}) {
            if (!ids || ids.length === 0) return;
            const input = document.getElementById('playlist-input');

            input.value = ids[0];
            await loadPlaylist(!autoplay);

            for (let i = 1; i < ids.length; i++) {
                // Small settle delay between combines to avoid player/DOM races
                await new Promise(resolve => setTimeout(resolve, 500));
                input.value = ids[i];
                await addPlaylist();
            }
        }

        // Load a saved entry (favorite / recent), restoring its custom name and
        // per-video exclusions so curation and naming stick across reloads.
        async function loadSavedEntry(entry, { autoplay = true } = {}) {
            if (!entry || !Array.isArray(entry.ids) || entry.ids.length === 0) return;

            // Build the combined queue (no autoplay yet — we may filter the first video out)
            await loadPlaylists([...new Set(entry.ids)], { autoplay: false });

            // Rehydrate the saved metadata onto the freshly-built history entry
            const history = JSON.parse(localStorage.getItem('playlistHistory') || '[]');
            if (history.length) {
                if (entry.customName) history[0].customName = entry.customName;
                if (entry.excludedVideoIds && entry.excludedVideoIds.length) {
                    history[0].excludedVideoIds = entry.excludedVideoIds.slice();
                }
                localStorage.setItem('playlistHistory', JSON.stringify(history));
            }

            // Filter out the excluded videos from the live queue
            const excluded = new Set(entry.excludedVideoIds || []);
            if (excluded.size) {
                playlistItems = playlistItems.filter(
                    it => it.snippet.resourceId && !excluded.has(it.snippet.resourceId.videoId)
                );
                currentIndex = 0;
                playedVideos = playlistItems.length ? [playlistItems[0]] : [];
            }

            // Refresh UI and start playback
            if (playlistItems.length && player && autoplay) {
                await playVideo(0);
            } else {
                displayPlaylist();
                saveSession();
            }

            // Rare: every video was excluded — tell the user rather than showing a blank list
            if (playlistItems.length === 0) {
                showNotification('All videos in this list have been removed');
            }
        }

        // "Load Playlist" click: loads one or many depending on the toggle
        async function handleLoadClick() {
            const ids = getEnteredIds();
            const errorMsg = document.getElementById('error-message');
            if (ids.length === 0) {
                if (errorMsg) {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = 'Error: No valid playlist URL or ID found';
                }
                return;
            }
            try {
                await loadPlaylists(ids, { autoplay: true });
            } catch (e) {
                // loadPlaylist already surfaces its own error message
                console.error('Error loading playlists:', e);
            }
        }

        // "Add to Current" click: appends one or many depending on the toggle
        async function handleAddClick() {
            const multi = document.getElementById('multi-toggle').checked;
            const input = document.getElementById('playlist-input');
            if (multi) {
                const ids = getEnteredIds();
                for (let i = 0; i < ids.length; i++) {
                    if (i > 0) await new Promise(resolve => setTimeout(resolve, 500));
                    input.value = ids[i];
                    await addPlaylist();
                }
            } else {
                await addPlaylist();
            }
        }

        // Update loadPlaylist function to handle playlist combinations
        async function loadPlaylist(preventAutoPlay = false) {
            const loadingIndicator = document.getElementById('loading');
            const errorMsg = document.getElementById('error-message');
            const inputElement = document.getElementById('playlist-input');
            const welcomeSection = document.getElementById('welcome-section');
            
            try {
                // Show loading state
                if (loadingIndicator) loadingIndicator.style.display = 'inline';
                if (errorMsg) errorMsg.style.display = 'none';

                const input = inputElement.value.trim();
                const playlistId = getPlaylistId(input);
                if (!playlistId) {
                    throw new Error('Invalid playlist URL or ID');
                }

                // Load YouTube API and wait for it
                await loadYouTubeAPI();

                // Initialize player if needed
                if (!player) {
                    initializePlayer();
                    await playerReadyPromise;
                }

                // Fetch playlist items
                const items = await fetchPlaylistItems(playlistId);
                
                if (!items || items.length === 0) {
                    throw new Error('No videos found in playlist');
                }

                // Check if we're adding to existing playlist
                const addButton = document.getElementById('add-playlist-button');
                const isAdding = addButton && 
                               addButton.style.display === 'inline' &&
                               addButton.dataset.adding === 'true';

                if (!isAdding) {
                    // New playlist load
                    playlistItems = items;
                    currentIndex = 0;
                } else {
                    // Adding to existing playlist - don't change currentIndex
                    // Don't combine here - let addPlaylist handle it
                    playlistItems = items;
                }

                // Hide welcome section completely
                if (welcomeSection) {
                    welcomeSection.style.display = 'none';
                }

                document.getElementById('initial-controls').style.display = 'none';
                document.getElementById('playlist-container').style.display = 'block';
                document.getElementById('actual-controls').style.display = 'flex';
                document.getElementById('actual-playlist-header').style.display = 'flex';
                document.getElementById('add-playlist-button').style.display = 'inline';

                // Save to history
                if (items[0] && items[0].snippet) {
                    saveToHistory(playlistId, items[0].snippet.playlistTitle);
                }

                // Initialize played videos only for new playlist loads
                if (!isAdding) {
                    playedVideos = [items[0]];
                }
                
                // Display playlist
                displayPlaylist();

                // Only load first video if this is a new playlist load and not prevented
                if (!isAdding && !preventAutoPlay) {
                    const firstVideoId = items[0].snippet.resourceId.videoId;
                    player.loadVideoById(firstVideoId);
                }

                displayFavorites();
                updateFavoriteButton();

            } catch (error) {
                console.error('Error:', error);
                if (errorMsg) {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = `Error: ${error.message}`;
                }
                document.getElementById('add-playlist-button').style.display = 'none';
                
                // Show welcome section if there's an error
                if (welcomeSection) {
                    welcomeSection.style.display = 'block';
                }
                displayHistory();
                
                throw error;
            } finally {
                if (loadingIndicator) {
                    loadingIndicator.style.display = 'none';
                }
            }
        }

        // Fetch playlist items using YouTube Data API
        async function fetchPlaylistItems(playlistId, pageToken = '', items = []) {
            console.log(`Starting fetch for playlist: ${playlistId}`);
            
            const apiKey = 'AIzaSyBZ4Ow6AF03kHdJrbeYODzJ8FFNKZ-iTVE';
            const maxResults = 50;
            
            try {
                // First, get the playlist title
                const playlistUrl = `https://www.googleapis.com/youtube/v3/playlists?part=snippet&id=${playlistId}&key=${apiKey}`;
                const playlistResponse = await fetch(playlistUrl);
                const playlistData = await playlistResponse.json();
                
                if (playlistData.error) {
                    throw new Error(playlistData.error.message);
                }

                const playlistTitle = playlistData.items?.[0]?.snippet?.title || 'Playlist';
                
                // Now fetch the playlist items
                const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=${maxResults}&playlistId=${playlistId}&key=${apiKey}${pageToken ? '&pageToken=' + pageToken : ''}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                if (!data.items || data.items.length === 0) {
                    throw new Error('No videos found in playlist');
                }

                // Add playlist title to each item
                const itemsWithTitle = data.items.map(item => ({
                    ...item,
                    snippet: {
                        ...item.snippet,
                        playlistTitle: playlistTitle
                    }
                }));

                items.push(...itemsWithTitle);

                if (data.nextPageToken) {
                    return fetchPlaylistItems(playlistId, data.nextPageToken, items);
                }

                return items;
            } catch (error) {
                console.error('Error in fetchPlaylistItems:', error);
                throw error;
            }
        }

        // Add this helper function for creating combined titles
        function createCombinedTitle(titles) {
            if (!titles || titles.length === 0) return 'Playlist';
            
            // If only one playlist, return its title
            if (titles.length === 1) return titles[0];
            
            // For multiple playlists, create a smart combined name
            const maxLength = 50; // Maximum characters for combined title
            
            // Option 1: Show count if too many playlists
            if (titles.length > 3) {
                return `Combined Playlist (${titles.length} playlists)`;
            }
            
            // Option 2: Try to combine names with truncation
            const combinedTitle = titles.join(' + ');
            if (combinedTitle.length <= maxLength) {
                return combinedTitle;
            }
            
            // Option 3: Show first playlist + count
            return `${titles[0].substring(0, 30)}... (+${titles.length - 1} more)`;
        }

        // Escape user-supplied text before inserting it via innerHTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text == null ? '' : String(text);
            return div.innerHTML;
        }

        // Update displayPlaylist function to handle multiple playlist links
        function displayPlaylist() {
            const container = document.getElementById('playlist-container');
            const playlistTitle = document.getElementById('playlist-title');

            // Nothing to show (e.g. every video was filtered out) — clear UI and bail safely
            if (!playlistItems || playlistItems.length === 0) {
                if (container) container.innerHTML = '';
                const counter = document.getElementById('video-counter');
                if (counter) counter.textContent = '0/0';
                displayPlaylistGroups();
                return;
            }

            if (playlistTitle) {
                const existingHistory = JSON.parse(localStorage.getItem('playlistHistory') || '[]')[0];
                let titles = [playlistItems[0].snippet.playlistTitle];
                let ids = [getPlaylistId(document.getElementById('playlist-input').value)];
                
                // Get all titles and IDs from history if they exist
                if (existingHistory && existingHistory.titles && existingHistory.ids) {
                    titles = existingHistory.titles;
                    ids = existingHistory.ids;
                }
                
                // A user-set custom name wins over the auto-generated combined title
                const displayName = (existingHistory && existingHistory.customName) || createCombinedTitle(titles);

                if (ids.length > 1) {
                    // Combined: plain label. Each source playlist links out from its chip.
                    playlistTitle.textContent = displayName;
                } else {
                    // Single playlist - just show direct link
                    playlistTitle.innerHTML = `
                        <a href="https://www.youtube.com/playlist?list=${encodeURIComponent(ids[0])}"
                           target="_blank">${escapeHtml(displayName)}</a>
                    `;
                }
            }

            // Render the source-playlist chips above the list
            displayPlaylistGroups();

            if (!container || !playlistItems || playlistItems.length === 0) return;

            container.innerHTML = ''; // Clear existing content

            // Create and append playlist items
            playlistItems.forEach((item, index) => {
                if (item && item.snippet) {
                    const div = document.createElement('div');
                    div.className = 'playlist-item';
                    if (index === currentIndex) {
                        div.classList.add('active');
                    }
                    div.onclick = () => playVideo(index);

                    const titleSpan = document.createElement('span');
                    titleSpan.className = 'item-title';
                    titleSpan.textContent = item.snippet.title;
                    div.appendChild(titleSpan);

                    // Per-video remove (drops just this song from the queue)
                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'item-remove';
                    removeBtn.innerHTML = '&times;';
                    removeBtn.title = 'Remove this video from the queue';
                    removeBtn.onclick = (e) => {
                        e.stopPropagation();
                        removeVideo(index);
                    };
                    div.appendChild(removeBtn);

                    container.appendChild(div);

                    // If this is the current item, scroll it into view
                    if (index === currentIndex) {
                        // Use setTimeout to ensure DOM is updated
                        setTimeout(() => {
                            div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }, 100);
                    }
                }
            });

            // Update video counter
            const counter = document.getElementById('video-counter');
            if (counter) {
                counter.textContent = `${currentIndex + 1}/${playlistItems.length}`;
            }
        }

        // Render the chips bar of source playlists (with per-playlist remove).
        // Always visible while multiple playlists are combined, before or after shuffle.
        function displayPlaylistGroups() {
            const groupsBar = document.getElementById('playlist-groups');
            if (!groupsBar) return;

            // Distinct source playlists currently in the queue, keeping a title for each
            const seen = new Map(); // playlistId -> title
            playlistItems.forEach(it => {
                const pid = it && it.snippet && it.snippet.playlistId;
                if (pid && !seen.has(pid)) {
                    seen.set(pid, (it.snippet.playlistTitle) || 'Playlist');
                }
            });

            // Only relevant when more than one playlist is combined
            if (seen.size <= 1) {
                groupsBar.style.display = 'none';
                groupsBar.innerHTML = '';
                return;
            }

            // Prefer the stable load order stored in history, falling back to queue order
            let orderedIds = [...seen.keys()];
            const hist = JSON.parse(localStorage.getItem('playlistHistory') || '[]')[0];
            if (hist && Array.isArray(hist.ids)) {
                const ordered = hist.ids.filter(id => seen.has(id));
                seen.forEach((_, id) => { if (!ordered.includes(id)) ordered.push(id); });
                if (ordered.length) orderedIds = ordered;
            }

            groupsBar.innerHTML = '';
            const label = document.createElement('span');
            label.className = 'groups-label';
            label.textContent = 'Playlists:';
            groupsBar.appendChild(label);

            orderedIds.forEach(id => {
                const chip = document.createElement('span');
                chip.className = 'playlist-chip';

                const name = document.createElement('a');
                name.className = 'chip-name';
                name.href = `https://www.youtube.com/playlist?list=${encodeURIComponent(id)}`;
                name.target = '_blank';
                name.title = 'Open this playlist on YouTube';
                name.textContent = seen.get(id) || 'Playlist';
                chip.appendChild(name);

                const removeBtn = document.createElement('button');
                removeBtn.className = 'chip-remove';
                removeBtn.innerHTML = '&times;';
                removeBtn.title = 'Remove this playlist from the queue';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    removePlaylistGroup(id);
                };
                chip.appendChild(removeBtn);

                groupsBar.appendChild(chip);
            });

            groupsBar.style.display = 'flex';
        }

        // Play video at specific index
        async function playVideo(index) {
            if (!playlistItems || !playlistItems[index]) {
                console.error('Invalid video index or no playlist loaded');
                return;
            }

            try {
                if (!playerReady) {
                    await playerReadyPromise;
                }

                currentIndex = index;
                const videoItem = playlistItems[index];
                const videoId = videoItem.snippet.resourceId.videoId;

                // Update played videos history
                const lastPlayed = playedVideos[playedVideos.length - 1];
                if (!lastPlayed || lastPlayed.snippet.resourceId.videoId !== videoId) {
                    playedVideos.push(videoItem);
                }
                
                // Update player
                player.loadVideoById(videoId);
                
                // Update UI
                displayPlaylist();
                
                // Save session
                saveSession();

                // Hide error message if video loads
                const errorMsg = document.getElementById('error-message');
                if (errorMsg) {
                    errorMsg.style.display = 'none';
                }

            } catch (error) {
                console.error('Error playing video:', error);
                // Only show error message if video isn't playing
                if (player.getPlayerState() === -1) {  // -1 means unstarted
                    const errorMsg = document.getElementById('error-message');
                    if (errorMsg) {
                        errorMsg.style.display = 'block';
                        errorMsg.textContent = 'Error playing video. Please try again.';
                    }
                }
            }
        }

        // Play next video
        function playNext() {
            if (!playlistItems || playlistItems.length === 0) return;

            const isLooping = document.getElementById('loop-checkbox').checked;
            
            // Calculate next index
            let nextIndex = currentIndex + 1;
            
            // If we're at the end
            if (nextIndex >= playlistItems.length) {
                if (isLooping) {
                    // Loop back to start if looping is enabled
                    nextIndex = 0;
                } else {
                    // Stop at the end if not looping
                    return;
                }
            }
            
            currentIndex = nextIndex;
            playVideo(currentIndex);
        }

        // Shuffle playlist
        async function shufflePlaylist() {
            // Nothing loaded yet: if the user typed playlist(s), load them first, then shuffle.
            // Suppress autoplay so the shuffle picks the starting video, not the original first one.
            if (!playlistItems || playlistItems.length === 0) {
                const ids = getEnteredIds();
                if (ids.length === 0) return;
                try {
                    await loadPlaylists(ids, { autoplay: false });
                } catch (e) {
                    return; // loadPlaylist already surfaces the error to the user
                }
                if (!playlistItems || playlistItems.length === 0) return;
            }

            // Fisher-Yates over the whole list, including the currently playing video
            for (let i = playlistItems.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [playlistItems[i], playlistItems[j]] = [playlistItems[j], playlistItems[i]];
            }

            // Start from the top of the freshly shuffled order
            currentIndex = 0;
            playedVideos = [playlistItems[0]];

            // Play the new first video (updates highlight, counter, and saves the session)
            if (player) {
                await playVideo(0);
            } else {
                displayPlaylist();
                saveSession();
            }
        }

        // Remove every video belonging to one source playlist from the combined queue
        function removePlaylistGroup(playlistId) {
            if (!playlistItems || playlistItems.length === 0) return;

            const currentItem = playlistItems[currentIndex];
            const currentVideoId = currentItem &&
                currentItem.snippet.resourceId && currentItem.snippet.resourceId.videoId;
            const wasPlayingRemoved = currentItem &&
                currentItem.snippet.playlistId === playlistId;

            const remaining = playlistItems.filter(it => it.snippet.playlistId !== playlistId);
            // Never remove the last remaining group — leave at least one playlist loaded
            if (remaining.length === 0 || remaining.length === playlistItems.length) return;

            playlistItems = remaining;

            // Keep the combined history entry (which drives the title/chips) in sync
            removeIdFromCurrentHistory(playlistId);

            if (wasPlayingRemoved) {
                // The playing video was removed: play whatever now sits at that position
                currentIndex = Math.min(currentIndex, playlistItems.length - 1);
                playedVideos = [playlistItems[currentIndex]];
                if (player) {
                    playVideo(currentIndex);
                    return; // playVideo re-renders and saves
                }
            } else {
                // The playing video survived — re-point currentIndex at its new position
                const newIndex = playlistItems.findIndex(
                    it => it.snippet.resourceId.videoId === currentVideoId
                );
                currentIndex = newIndex >= 0 ? newIndex : 0;
            }

            displayPlaylist();
            saveSession();
            updateFavoriteButton();
        }

        // Remove a single video from the queue by its position
        function removeVideo(index) {
            if (!playlistItems || index < 0 || index >= playlistItems.length) return;
            if (playlistItems.length === 1) {
                showNotification("Can't remove the last video");
                return;
            }

            const removed = playlistItems[index];
            const removedPid = removed && removed.snippet && removed.snippet.playlistId;
            const removedVideoId = removed && removed.snippet &&
                removed.snippet.resourceId && removed.snippet.resourceId.videoId;
            const wasCurrent = index === currentIndex;

            playlistItems.splice(index, 1);

            // Keep currentIndex pointing at the right video
            if (index < currentIndex) {
                currentIndex--;
            } else if (wasCurrent) {
                // Removed the playing video: fall through to whatever now sits here
                currentIndex = Math.min(currentIndex, playlistItems.length - 1);
            }

            // If that was the last video of its source playlist, drop the whole playlist;
            // otherwise remember to skip just this video the next time the list is loaded.
            if (removedPid && !playlistItems.some(it => it.snippet.playlistId === removedPid)) {
                removeIdFromCurrentHistory(removedPid);
            } else if (removedVideoId) {
                excludeVideoInCurrentEntry(removedVideoId);
            }

            if (wasCurrent && player) {
                // Continue playback with the video that took this slot
                playVideo(currentIndex); // re-renders, saves, loads
            } else {
                displayPlaylist();
                saveSession();
            }
        }

        // Drop a playlist id (and its matching title) from the current history entry
        function removeIdFromCurrentHistory(playlistId) {
            try {
                const history = JSON.parse(localStorage.getItem('playlistHistory') || '[]');
                if (!history.length || !Array.isArray(history[0].ids)) return;

                const entry = history[0];
                const idx = entry.ids.indexOf(playlistId);
                if (idx === -1) return;

                entry.ids.splice(idx, 1);
                if (Array.isArray(entry.titles) && idx < entry.titles.length) {
                    entry.titles.splice(idx, 1);
                }
                localStorage.setItem('playlistHistory', JSON.stringify(history));
                displayHistory();
            } catch (e) {
                console.error('Error updating history after removal:', e);
            }
        }

        // Record a video id to skip on future loads of the current entry (and its favorite)
        function excludeVideoInCurrentEntry(videoId) {
            try {
                const history = JSON.parse(localStorage.getItem('playlistHistory') || '[]');
                if (!history.length) return;

                const entry = history[0];
                entry.excludedVideoIds = entry.excludedVideoIds || [];
                if (!entry.excludedVideoIds.includes(videoId)) {
                    entry.excludedVideoIds.push(videoId);
                }
                localStorage.setItem('playlistHistory', JSON.stringify(history));

                // Keep a matching favorite's exclusion list in sync
                const favorites = JSON.parse(localStorage.getItem('playlistFavorites') || '[]');
                const favIdx = favorites.findIndex(f =>
                    JSON.stringify(f.ids) === JSON.stringify(entry.ids)
                );
                if (favIdx !== -1) {
                    favorites[favIdx].excludedVideoIds = entry.excludedVideoIds.slice();
                    localStorage.setItem('playlistFavorites', JSON.stringify(favorites));
                }
            } catch (e) {
                console.error('Error recording excluded video:', e);
            }
        }

        // Clear exclusions for videos brought back into the queue (e.g. by re-adding a
        // playlist), so a restored song stays restored on future loads of the entry.
        function unexcludeVideosInCurrentEntry(videoIds) {
            if (!videoIds || !videoIds.length) return;
            try {
                const restore = new Set(videoIds);

                const history = JSON.parse(localStorage.getItem('playlistHistory') || '[]');
                if (!history.length || !Array.isArray(history[0].excludedVideoIds)) return;

                const entry = history[0];
                entry.excludedVideoIds = entry.excludedVideoIds.filter(id => !restore.has(id));
                localStorage.setItem('playlistHistory', JSON.stringify(history));

                // Keep a matching favorite's exclusion list in sync
                const favorites = JSON.parse(localStorage.getItem('playlistFavorites') || '[]');
                const favIdx = favorites.findIndex(f =>
                    JSON.stringify(f.ids) === JSON.stringify(entry.ids)
                );
                if (favIdx !== -1 && Array.isArray(favorites[favIdx].excludedVideoIds)) {
                    favorites[favIdx].excludedVideoIds =
                        favorites[favIdx].excludedVideoIds.filter(id => !restore.has(id));
                    localStorage.setItem('playlistFavorites', JSON.stringify(favorites));
                }
            } catch (e) {
                console.error('Error clearing exclusions on re-add:', e);
            }
        }

        // Resize player
        function resizePlayer() {
            const size = document.getElementById('size-selector').value;
            const container = document.getElementById('player-container');
            
            switch(size) {
                case 'small':
                    player.setSize(427, 240);
                    break;
                case 'medium':
                    player.setSize(853, 480);
                    break;
                case 'large':
                    player.setSize(1280, 720);
                    break;
            }
        }

        function playPrevious() {
            if (!playlistItems || playlistItems.length === 0) return;

            // Move to previous index, loop to end if at start
            currentIndex = (currentIndex - 1 + playlistItems.length) % playlistItems.length;
            playVideo(currentIndex);
        }

        // Save session data
        function saveSession() {
            // Only persist what resume actually reads back. The full playlistItems /
            // playedVideos arrays are rebuilt from history on resume, and storing thousands
            // of them can exceed the localStorage quota (which would otherwise throw here,
            // mid-playback, and surface as a spurious "Error playing video").
            const sessionData = {
                playlistId: getPlaylistId(document.getElementById('playlist-input').value),
                currentIndex: currentIndex,
                isLooping: document.getElementById('loop-checkbox').checked,
                playerSize: document.getElementById('size-selector').value,
                lastPlayedIndex: currentIndex
            };
            try {
                localStorage.setItem('youtubePlayerSession', JSON.stringify(sessionData));
            } catch (e) {
                console.error('Could not save session:', e);
            }
        }


        // Restore the last saved session: playlists, position, loop, and size
        async function resumeLastSession() {
            try {
                const savedSession = JSON.parse(localStorage.getItem('youtubePlayerSession') || '{}');
                const history = JSON.parse(localStorage.getItem('playlistHistory') || '[]');

                if (!history.length || !history[0].ids || !history[0].ids.length) {
                    return;
                }

                const lastSession = history[0];

                // Restore loop + player size preferences before loading
                if (typeof savedSession.isLooping === 'boolean') {
                    document.getElementById('loop-checkbox').checked = savedSession.isLooping;
                }
                if (savedSession.playerSize) {
                    document.getElementById('size-selector').value = savedSession.playerSize;
                }

                // Load and combine all saved playlists (restoring name + exclusions)
                // without autoplaying — we jump to the saved position below instead
                await loadSavedEntry(lastSession, { autoplay: false });

                // Apply the restored player size now that the player exists
                if (savedSession.playerSize && player) {
                    resizePlayer();
                }

                // Jump to the saved position and start playback there.
                // playVideo() updates the counter, active highlight, and scroll.
                if (typeof savedSession.currentIndex === 'number' &&
                    player && playlistItems[savedSession.currentIndex]) {
                    await playVideo(savedSession.currentIndex);
                }

                const welcomeSection = document.getElementById('welcome-section');
                const resumeButton = document.getElementById('resume-button');
                if (welcomeSection) welcomeSection.style.display = 'none';
                if (resumeButton) resumeButton.style.display = 'none';
            } catch (e) {
                console.error('Error in resumeLastSession:', e);
            }
        }

        // Load YouTube IFrame API with error handling
        function loadYouTubeAPI() {
            if (apiLoadPromise) return apiLoadPromise;
            
            apiLoadPromise = new Promise((resolve) => {
                if (window.YT && window.YT.Player) {
                    resolve();
                    return;
                }

                window.onYouTubeIframeAPIReady = function() {
                    console.log('YouTube API loaded');
                    resolve();
                };

                const tag = document.createElement('script');
                tag.src = 'https://www.youtube.com/iframe_api';
                const firstScriptTag = document.getElementsByTagName('script')[0];
                firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            });

            return apiLoadPromise;
        }

        // Initialize everything with proper error handling
        async function initializeApplication() {
            try {
                await loadYouTubeAPI();
                // Additional initialization can go here
            } catch (error) {
                console.error('Failed to initialize application:', error);
                const errorMsg = document.getElementById('error-message');
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Failed to load YouTube player. Please check your connection and refresh the page.';
            }
        }

        // Single consolidated page-load initializer
        document.addEventListener('DOMContentLoaded', () => {
            initializeApplication();

            // Initial UI state
            const playlistContainer = document.getElementById('playlist-container');
            if (playlistContainer) {
                playlistContainer.style.display = 'none';
            }

            // Show resume button only if a saved session exists
            const resumeButton = document.getElementById('resume-button');
            if (resumeButton && !localStorage.getItem('youtubePlayerSession')) {
                resumeButton.style.display = 'none';
            }

            // Populate favorites, history, and version
            displayFavorites();
            displayHistory();

            const versionElement = document.getElementById('version');
            if (versionElement) {
                versionElement.textContent = 'v1.0.5';
            }

            // Keyboard shortcuts: Space = play/pause, ←/→ = prev/next.
            // Ignored while typing in the input field.
            document.addEventListener('keydown', (e) => {
                const typing = document.activeElement &&
                    document.activeElement.tagName === 'INPUT';
                if (typing || !player || !playlistItems.length) return;

                if (e.code === 'Space') {
                    e.preventDefault();
                    const state = player.getPlayerState();
                    if (state === YT.PlayerState.PLAYING) {
                        player.pauseVideo();
                    } else {
                        player.playVideo();
                    }
                } else if (e.code === 'ArrowRight') {
                    e.preventDefault();
                    playNext();
                } else if (e.code === 'ArrowLeft') {
                    e.preventDefault();
                    playPrevious();
                }
            });

            // Persist the session when leaving so Resume is always accurate
            window.addEventListener('beforeunload', () => {
                if (playlistItems.length) saveSession();
            });
        });

        function saveToHistory(playlistId, title) {
            try {
                // Clean up the inputs and ensure uniqueness
                const ids = Array.isArray(playlistId) ? [...new Set(playlistId)] : [playlistId];
                let titles = Array.isArray(title) ? [...new Set(title)] : [title];
                
                // Don't split titles by comma - treat each title as a whole
                titles = titles.map(t => t.trim()).filter(t => t);

                // Get existing history
                let history = [];
                const stored = localStorage.getItem('playlistHistory');
                if (stored) {
                    history = JSON.parse(stored);
                }

                // Create new entry - ONLY combine if explicitly adding to current playlist
                const addPlaylistButton = document.getElementById('add-playlist-button');
                const isExplicitlyAdding = addPlaylistButton && 
                                         addPlaylistButton.style.display === 'inline' &&
                                         addPlaylistButton.dataset.adding === 'true';

                let newEntry;
                if (isExplicitlyAdding && history.length > 0) {
                    const current = history[0];
                    newEntry = {
                        ids: [...new Set([...current.ids, ...ids])],  // Ensure uniqueness when combining
                        titles: [...new Set([...current.titles, ...titles])],  // Ensure uniqueness when combining
                        timestamp: Date.now(),
                        // Preserve a name the user gave this combo when adding more playlists
                        ...(current.customName ? { customName: current.customName } : {}),
                        // Preserve any per-video exclusions across the add
                        ...(current.excludedVideoIds && current.excludedVideoIds.length
                            ? { excludedVideoIds: current.excludedVideoIds }
                            : {})
                    };
                    history.shift();
                } else {
                    // Create new single entry for fresh loads
                    newEntry = {
                        ids: ids,
                        titles: titles,
                        timestamp: Date.now()
                    };
                }

                // Add new entry to start of history
                history.unshift(newEntry);
                history = history.slice(0, 5);
                localStorage.setItem('playlistHistory', JSON.stringify(history));
                displayHistory();
                
            } catch (e) {
                console.error('Error saving history:', e);
            }
        }

        // Clean up addPlaylist function
        async function addPlaylist() {
            try {
                const addButton = document.getElementById('add-playlist-button');
                addButton.dataset.adding = 'true';

                // Store the current playlist items and index
                const currentItems = [...playlistItems];
                const savedIndex = currentIndex;
                
                // Load and combine the new playlist
                await loadPlaylist(true);  // Prevent autoplay

                // Combine, skipping videos already in the queue (dedupe by video id)
                const existingVideoIds = new Set(
                    currentItems.map(it => it.snippet && it.snippet.resourceId && it.snippet.resourceId.videoId)
                );
                const newUnique = playlistItems.filter(it => {
                    const vid = it.snippet && it.snippet.resourceId && it.snippet.resourceId.videoId;
                    return vid && !existingVideoIds.has(vid);
                });
                playlistItems = [...currentItems, ...newUnique];
                currentIndex = savedIndex;  // Restore the previous position

                // Re-adding a playlist restores songs you'd previously removed, so drop
                // those from the saved exclusion list to make the restore stick.
                unexcludeVideosInCurrentEntry(
                    newUnique
                        .map(it => it.snippet && it.snippet.resourceId && it.snippet.resourceId.videoId)
                        .filter(Boolean)
                );
                
                // Update the display
                displayPlaylist();
                
                // Update the video counter
                const counter = document.getElementById('video-counter');
                if (counter) {
                    counter.textContent = `${currentIndex + 1}/${playlistItems.length}`;
                }
                
            } catch (e) {
                console.error('Error adding playlist:', e);
                showNotification('Error adding playlist');
            } finally {
                const addButton = document.getElementById('add-playlist-button');
                addButton.dataset.adding = 'false';
            }
        }

        // Add function to clean up invalid history entries
        function cleanupPlaylistHistory() {
            try {
                const history = JSON.parse(localStorage.getItem('playlistHistory') || '[]');
                
                // Filter out invalid entries
                const validHistory = history.filter(entry => {
                    return entry 
                        && Array.isArray(entry.ids) 
                        && entry.ids.length > 0
                        && Array.isArray(entry.titles)
                        && entry.titles.length > 0
                        && entry.timestamp;
                });

                // If entries were removed, show notification
                if (validHistory.length !== history.length) {
                    const removedCount = history.length - validHistory.length;
                    showNotification(`Cleaned up ${removedCount} invalid playlist${removedCount !== 1 ? 's' : ''} from history`);
                    localStorage.setItem('playlistHistory', JSON.stringify(validHistory));
                }
                
                return validHistory;
            } catch (e) {
                console.error('Error cleaning history:', e);
                showNotification('History data was reset due to corruption');
                localStorage.setItem('playlistHistory', '[]');
                return [];
            }
        }

        // Update displayHistory to use the cleanup function
        function displayHistory() {
            const historyContainer = document.getElementById('history-items');
            
            if (!historyContainer) return;

            try {
                const history = cleanupPlaylistHistory();
                historyContainer.innerHTML = '';

                if (history.length === 0) {
                    historyContainer.innerHTML = '<div class="history-item">No recent playlists</div>';
                    return;
                }

                history.forEach((entry, index) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'history-item';
                    
                    // Create container with relative positioning
                    const contentDiv = document.createElement('div');
                    contentDiv.style.position = 'relative';
                    contentDiv.style.textAlign = 'center';
                    
                    // Create title span
                    const titleSpan = document.createElement('span');
                    const mainTitle = entry.titles[0] || 'Untitled Playlist';
                    const additionalCount = entry.titles.length - 1;
                    titleSpan.textContent = entry.customName
                        ? entry.customName
                        : (additionalCount > 0
                            ? `${mainTitle} (+${additionalCount} more)`
                            : mainTitle);
                    
                    // Create delete button with absolute positioning
                    const deleteBtn = document.createElement('button');
                    deleteBtn.innerHTML = '×';
                    deleteBtn.className = 'delete-button';
                    deleteBtn.title = 'Remove from history';
                    deleteBtn.style.position = 'absolute';
                    deleteBtn.style.right = '0';
                    deleteBtn.style.top = '50%';
                    deleteBtn.style.transform = 'translateY(-50%)';
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        history.splice(index, 1);
                        localStorage.setItem('playlistHistory', JSON.stringify(history));
                        displayHistory();
                    };
                    
                    contentDiv.appendChild(titleSpan);
                    contentDiv.appendChild(deleteBtn);
                    itemDiv.appendChild(contentDiv);
                    
                    // Update the history item click handler
                    itemDiv.onclick = async () => {
                        try {
                            // Load the recent entry, restoring its name + curated exclusions
                            await loadSavedEntry(entry, { autoplay: true });
                        } catch (error) {
                            console.error('Error loading playlist:', error);
                            const errorMsg = document.getElementById('error-message');
                            if (errorMsg) {
                                errorMsg.textContent = `Error: ${error.message}`;
                                errorMsg.style.display = 'block';
                            }
                        }
                    };
                    
                    historyContainer.appendChild(itemDiv);
                });

            } catch (e) {
                console.error('Error in displayHistory:', e);
                historyContainer.innerHTML = '<div class="history-item">Error loading history</div>';
            }
        }

        // Rename the current playlist entry; the name flows into the header,
        // favorites, and recent list. Clearing it restores the auto-generated title.
        function renamePlaylist() {
            try {
                const history = JSON.parse(localStorage.getItem('playlistHistory') || '[]');
                if (!history.length || !history[0].ids) {
                    showNotification('Load a playlist before renaming');
                    return;
                }

                const entry = history[0];
                const current = entry.customName || createCombinedTitle(entry.titles);
                const input = prompt('Name this playlist (leave blank to reset):', current);
                if (input === null) return; // cancelled

                const trimmed = input.trim();
                if (trimmed) {
                    entry.customName = trimmed;
                } else {
                    delete entry.customName; // reset to the auto-generated title
                }
                localStorage.setItem('playlistHistory', JSON.stringify(history));

                // Keep a matching favorite in sync with the new name
                const favorites = JSON.parse(localStorage.getItem('playlistFavorites') || '[]');
                const favIdx = favorites.findIndex(f =>
                    JSON.stringify(f.ids) === JSON.stringify(entry.ids)
                );
                if (favIdx !== -1) {
                    if (trimmed) {
                        favorites[favIdx].customName = trimmed;
                    } else {
                        delete favorites[favIdx].customName;
                    }
                    localStorage.setItem('playlistFavorites', JSON.stringify(favorites));
                }

                displayPlaylist();
                displayFavorites();
                displayHistory();
                showNotification(trimmed ? 'Playlist renamed' : 'Name reset');
            } catch (e) {
                console.error('Error renaming playlist:', e);
                showNotification('Error renaming playlist');
            }
        }

        // Update toggleFavorite function to handle combined playlists
        function toggleFavorite() {
            const history = JSON.parse(localStorage.getItem('playlistHistory') || '[]');
            
            // Get the current playlist info from history
            const currentPlaylist = history[0];
            
            if (!currentPlaylist || !currentPlaylist.ids || !currentPlaylist.titles) return;
            
            try {
                let favorites = JSON.parse(localStorage.getItem('playlistFavorites') || '[]');
                
                // Check if playlist is already in favorites
                const existingIndex = favorites.findIndex(entry => 
                    JSON.stringify(entry.ids) === JSON.stringify(currentPlaylist.ids)
                );
                
                if (existingIndex === -1) {
                    // Add to favorites
                    favorites.unshift(currentPlaylist);
                } else {
                    // Remove from favorites
                    favorites.splice(existingIndex, 1);
                }
                
                localStorage.setItem('playlistFavorites', JSON.stringify(favorites));
                updateFavoriteButton();
                displayFavorites();
                showNotification(existingIndex === -1 ? 'Added to favorites' : 'Removed from favorites');
            } catch (e) {
                console.error('Error toggling favorite:', e);
                showNotification('Error updating favorites');
            }
        }

        function updateFavoriteButton() {
            const existingHistory = JSON.parse(localStorage.getItem('playlistHistory') || '[]')[0];
            const favorites = JSON.parse(localStorage.getItem('playlistFavorites') || '[]');
            const isFavorited = favorites.some(fav => 
                JSON.stringify(fav.ids) === JSON.stringify(existingHistory?.ids)
            );
            
            const starButton = document.getElementById('favorite-button');
            if (starButton) {
                starButton.innerHTML = isFavorited ? '★' : '☆';
                starButton.style.color = isFavorited ? '#ffd700' : '#fff';
            }
        }

        function displayFavorites() {
            const container = document.getElementById('favorites-items');
            if (!container) return;

            try {
                const favorites = JSON.parse(localStorage.getItem('playlistFavorites') || '[]');
                container.innerHTML = '';

                if (!Array.isArray(favorites) || favorites.length === 0) {
                    container.innerHTML = '<div class="favorite-item">No favorite playlists</div>';
                    return;
                }

                favorites.forEach((entry, index) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'favorite-item';
                    
                    const contentDiv = document.createElement('div');
                    contentDiv.style.position = 'relative';
                    contentDiv.style.textAlign = 'center';
                    
                    const titleSpan = document.createElement('span');
                    const mainTitle = entry.titles[0] || 'Untitled Playlist';
                    const additionalCount = entry.titles.length - 1;
                    titleSpan.textContent = entry.customName
                        ? entry.customName
                        : (additionalCount > 0
                            ? `${mainTitle} (+${additionalCount} more)`
                            : mainTitle);
                    
                    const deleteBtn = document.createElement('button');
                    deleteBtn.innerHTML = '×';
                    deleteBtn.className = 'delete-button';
                    deleteBtn.title = 'Remove from favorites';
                    deleteBtn.style.position = 'absolute';
                    deleteBtn.style.right = '0';
                    deleteBtn.style.top = '50%';
                    deleteBtn.style.transform = 'translateY(-50%)';
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        favorites.splice(index, 1);
                        localStorage.setItem('playlistFavorites', JSON.stringify(favorites));
                        displayFavorites();
                        updateFavoriteButton();
                    };
                    
                    contentDiv.appendChild(titleSpan);
                    contentDiv.appendChild(deleteBtn);
                    itemDiv.appendChild(contentDiv);
                    
                    itemDiv.onclick = async () => {
                        try {
                            // Load the favorite, restoring its name + curated exclusions
                            await loadSavedEntry(entry, { autoplay: true });
                        } catch (error) {
                            console.error('Error loading playlist:', error);
                            const errorMsg = document.getElementById('error-message');
                            if (errorMsg) {
                                errorMsg.textContent = `Error: ${error.message}`;
                                errorMsg.style.display = 'block';
                            }
                        }
                    };

                    container.appendChild(itemDiv);
                });

            } catch (e) {
                console.error('Error in displayFavorites:', e);
            }
        }

        // Update showNotification with longer duration
        function showNotification(message, duration = 5000) {
            // Remove any existing notification
            const existingNotification = document.querySelector('.notification');
            if (existingNotification) {
                existingNotification.remove();
            }

            // Create new notification
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);

            // Trigger animation
            setTimeout(() => notification.classList.add('show'), 10);

            // Remove after duration
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, duration);
        }

        function clearHistory() {
            try {
                localStorage.removeItem('playlistHistory');
                displayHistory();
                showNotification('Playlist history cleared');
            } catch (e) {
                console.error('Error clearing history:', e);
                showNotification('Error clearing playlist history');
            }
        }
    </script>
